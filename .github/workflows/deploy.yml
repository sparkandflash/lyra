name: Deploy to GCP VM

on:
  push:
    branches:
      - cd-ci

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build Binary
        run: |
          cd terminal-app
          GOOS=linux GOARCH=amd64 go build -o terminal-app-linux

      - name: Copy binary to GCP VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.GCP_VM_IP }}
          username: ${{ secrets.GCP_VM_USERNAME }}
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          source: "terminal-app/terminal-app-linux"
          target: "/home/${{ secrets.GCP_VM_USERNAME }}/msrpengine"
          strip_components: 1

      - name: Restart Engine Service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_VM_IP }}
          username: ${{ secrets.GCP_VM_USERNAME }}
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          script: |
            cd /home/${{ secrets.GCP_VM_USERNAME }}/msrpengine
            chmod +x terminal-app-linux
            sudo systemctl restart lyra
